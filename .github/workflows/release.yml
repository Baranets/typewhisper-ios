name: Sideload Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.8)"
        required: true
        type: string
      build_number:
        description: "Build number (optional - uses GitHub run number if empty)"
        required: false
        type: string
      release_tag:
        description: "Optional tag for manual runs (defaults to manual-v<version>-<run_number>)"
        required: false
        type: string

permissions:
  contents: write

env:
  SCHEME: TypeWhisper
  PROJECT: TypeWhisper.xcodeproj
  ARCHIVE_PATH: build/TypeWhisper.xcarchive
  EXPORT_PATH: build/export
  KEYCHAIN_NAME: signing.keychain-db
  KEYCHAIN_PASSWORD: ${{ github.run_id }}

jobs:
  build-and-release:
    name: Build & Publish Sideload Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Unsupported release tag: $TAG_NAME"
              echo "Expected format: vX.Y.Z"
              exit 1
            fi

            VERSION="${TAG_NAME#v}"
            RELEASE_TAG="$TAG_NAME"
            RELEASE_NAME="TypeWhisper iOS ${VERSION}"
            PRERELEASE=false
          else
            VERSION="${{ inputs.version }}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Unsupported manual release version: $VERSION"
              echo "Expected format: X.Y.Z"
              exit 1
            fi

            RELEASE_TAG="${{ inputs.release_tag }}"
            if [[ -z "$RELEASE_TAG" ]]; then
              RELEASE_TAG="manual-v${VERSION}-${GITHUB_RUN_NUMBER}"
            fi

            RELEASE_NAME="TypeWhisper iOS ${VERSION} (manual)"
            PRERELEASE=true
          fi

          BUILD_NUMBER="${{ inputs.build_number }}"
          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi

          {
            echo "VERSION=$VERSION"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_NAME=$RELEASE_NAME"
            echo "PRERELEASE=$PRERELEASE"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "IPA_FILENAME=TypeWhisper-${VERSION}.ipa"
          } >> "$GITHUB_ENV"

          echo "Resolved version: $VERSION"
          echo "Resolved release tag: $RELEASE_TAG"
          echo "Resolved build number: $BUILD_NUMBER"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show available SDKs
        run: xcodebuild -showsdks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_SIGNING_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_SIGNING_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_NAME"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychain -d user -s "$KEYCHAIN_NAME" login.keychain-db

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROVISIONING_PROFILE }}
          KEYBOARD_PROFILE_BASE64: ${{ secrets.IOS_KEYBOARD_PROVISIONING_PROFILE }}
          WIDGET_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE }}
          SHARE_PROFILE_BASE64: ${{ secrets.IOS_SHARE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          APP_PROFILE_PATH="$RUNNER_TEMP/app_profile.mobileprovision"
          echo "$APP_PROFILE_BASE64" | base64 --decode > "$APP_PROFILE_PATH"
          /usr/bin/security cms -D -i "$APP_PROFILE_PATH" > "$RUNNER_TEMP/app_profile.plist"
          APP_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/app_profile.plist")
          APP_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/app_profile.plist")
          cp "$APP_PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$APP_PROFILE_UUID.mobileprovision"
          echo "APP_PROFILE_NAME=$APP_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed app profile: $APP_PROFILE_NAME ($APP_PROFILE_UUID)"

          KB_PROFILE_PATH="$RUNNER_TEMP/keyboard_profile.mobileprovision"
          echo "$KEYBOARD_PROFILE_BASE64" | base64 --decode > "$KB_PROFILE_PATH"
          /usr/bin/security cms -D -i "$KB_PROFILE_PATH" > "$RUNNER_TEMP/kb_profile.plist"
          KB_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/kb_profile.plist")
          KB_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/kb_profile.plist")
          cp "$KB_PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$KB_PROFILE_UUID.mobileprovision"
          echo "KB_PROFILE_NAME=$KB_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed keyboard profile: $KB_PROFILE_NAME ($KB_PROFILE_UUID)"

          WG_PROFILE_PATH="$RUNNER_TEMP/widget_profile.mobileprovision"
          echo "$WIDGET_PROFILE_BASE64" | base64 --decode > "$WG_PROFILE_PATH"
          /usr/bin/security cms -D -i "$WG_PROFILE_PATH" > "$RUNNER_TEMP/wg_profile.plist"
          WG_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/wg_profile.plist")
          WG_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/wg_profile.plist")
          cp "$WG_PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$WG_PROFILE_UUID.mobileprovision"
          echo "WG_PROFILE_NAME=$WG_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed widget profile: $WG_PROFILE_NAME ($WG_PROFILE_UUID)"

          SH_PROFILE_PATH="$RUNNER_TEMP/share_profile.mobileprovision"
          echo "$SHARE_PROFILE_BASE64" | base64 --decode > "$SH_PROFILE_PATH"
          /usr/bin/security cms -D -i "$SH_PROFILE_PATH" > "$RUNNER_TEMP/sh_profile.plist"
          SH_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/sh_profile.plist")
          SH_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/sh_profile.plist")
          cp "$SH_PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$SH_PROFILE_UUID.mobileprovision"
          echo "SH_PROFILE_NAME=$SH_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed share profile: $SH_PROFILE_NAME ($SH_PROFILE_UUID)"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2D8ALY3LCL \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            TW_APP_PROFILE="$APP_PROFILE_NAME" \
            TW_KB_PROFILE="$KB_PROFILE_NAME" \
            TW_WG_PROFILE="$WG_PROFILE_NAME" \
            TW_SH_PROFILE="$SH_PROFILE_NAME" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Generate ExportOptions.plist
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>release-testing</string>
            <key>teamID</key>
            <string>2D8ALY3LCL</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.typewhisper.typewhisper-app</key>
              <string>${APP_PROFILE_NAME}</string>
              <key>com.typewhisper.typewhisper-app.keyboard</key>
              <string>${KB_PROFILE_NAME}</string>
              <key>com.typewhisper.typewhisper-app.widget</key>
              <string>${WG_PROFILE_NAME}</string>
              <key>com.typewhisper.typewhisper-app.share</key>
              <string>${SH_PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath "$EXPORT_PATH"

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          IPA_PATH=$(find "$EXPORT_PATH" -maxdepth 1 -name "*.ipa" -print -quit)
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA found in $EXPORT_PATH"
            exit 1
          fi

          FINAL_IPA_PATH="$EXPORT_PATH/$IPA_FILENAME"
          mv "$IPA_PATH" "$FINAL_IPA_PATH"

          shasum -a 256 "$FINAL_IPA_PATH" > "$EXPORT_PATH/SHA256SUMS.txt"

          {
            echo "FINAL_IPA_PATH=$FINAL_IPA_PATH"
            echo "CHECKSUM_PATH=$EXPORT_PATH/SHA256SUMS.txt"
          } >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            Signed sideload release for AltStore and Sideloadly.

            Assets:
            - `${{ env.IPA_FILENAME }}`
            - `SHA256SUMS.txt`

            Official releases are published from git tags in the `vX.Y.Z` format.
          prerelease: ${{ env.PRERELEASE }}
          fail_on_unmatched_files: true
          files: |
            ${{ env.FINAL_IPA_PATH }}
            ${{ env.CHECKSUM_PATH }}

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/app_profile.mobileprovision"
          rm -f "$RUNNER_TEMP/keyboard_profile.mobileprovision"
          rm -f "$RUNNER_TEMP/widget_profile.mobileprovision"
          rm -f "$RUNNER_TEMP/share_profile.mobileprovision"
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/
